<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrology Chart Calculator (Direct API)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    form {
      display: grid;
      gap: 10px;
    }

    label {
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 5px;
    }

    button {
      background-color: #4caf50;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    #results,
    #error {
      margin-top: 20px;
    }

    #error {
      color: red;
    }

    #results {
      white-space: pre-wrap;
      font-family: monospace;
    }

    #genderField {
      display: none;
    }
  </style>
</head>

<body>
  <h1>Astrology Chart Calculator</h1>
  <p>
    <em>Note: This calculator makes direct calls to the astrology API.</em>
    <!-- ASTROLOGY CONTEXT:
         Precision is key in astrology. A difference of 4 minutes in birth time can change the Ascendant by 1 degree.
         Similarly, a few kilometers in latitude/longitude can shift the house cusps significantly.
    -->
  </p>
  <form id="astroForm">
    <label for="name">Name:</label>
    <input type="text" id="name" maxlength="255" required />

    <label for="type">Type:</label>
    <select id="type" required>
      <option value="Event">Event</option>
      <option value="Person">Person</option>
      <option value="Other">Other</option>
    </select>

    <div id="genderField">
      <label for="gender">Gender:</label>
      <select id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <label for="year">Year:</label>
    <input type="number" id="year" required min="1" max="9999" value="1983" />

    <label for="month">Month:</label>
    <input type="number" id="month" required min="1" max="12" value="05" />

    <label for="day">Day:</label>
    <input type="number" id="day" required min="1" max="31" value="09" />

    <label for="hour">Hour (24-hour format):</label>
    <input type="number" id="hour" required min="0" max="23" value="10" />

    <label for="minute">Minute:</label>
    <input type="number" id="minute" required min="0" max="59" value="40" />

    <label for="second">Second:</label>
    <input type="number" id="second" step="any" required min="0" max="59.999" value="00" />

    <label for="timezone">Timezone:</label>
    <select id="timezone" required>
      <option value="Europe/Bucharest">Bucharest (GMT/BST)</option>
      <option value="Europe/Paris">Paris (CET/CEST)</option>
      <option value="Asia/Tokyo">Tokyo (JST)</option>
      <option value="Australia/Sydney">Sydney (AEST/AEDT)</option>
    </select>

    <label for="latitude">Latitude:</label>
    <input type="number" id="latitude" required min="-90" max="90" step="any" value="47.1667" />

    <label for="longitude">Longitude:</label>
    <input type="number" id="longitude" required min="-180" max="180" step="any" value="27.6000" />
    <button type="submit">Calculate Chart</button>
  </form>

  <div id="error"></div>
  <div id="results"></div>

  <script>
    document.getElementById("type").addEventListener("change", function () {
      const genderField = document.getElementById("genderField");
      if (this.value === "Person") {
        genderField.style.display = "block";
      } else {
        genderField.style.display = "none";
      }
    });

    document
      .getElementById("astroForm")
      .addEventListener("submit", async function (e) {
        e.preventDefault();
        const jsonResult = await calculateChart();
        displayResults(jsonResult);
      });

    async function calculateChart() {
      // Collect all inputs from the form
      // ASTROLOGY CONTEXT: We need all these variables to calculate a "Natal Chart" or "Event Chart".
      // - Date/Time: Determines planetary positions.
      // - Lat/Long: Determines the House System (where planets fall in the sky relative to the horizon).
      const name = document.getElementById("name").value;
      const type = document.getElementById("type").value;
      const gender = document.getElementById("gender").value;
      const year = document.getElementById("year").value;
      const month = document.getElementById("month").value;
      const day = document.getElementById("day").value;
      const hour = document.getElementById("hour").value;
      const minute = document.getElementById("minute").value;
      const second = document.getElementById("second").value;
      const timezone = document.getElementById("timezone").value;
      const latitude = document.getElementById("latitude").value;
      const longitude = document.getElementById("longitude").value;

      const apiUrl = new URL("http://localhost:3000/calculate");
      apiUrl.searchParams.append("name", name);
      apiUrl.searchParams.append("type", type);
      if (type === "Person") {
        apiUrl.searchParams.append("gender", gender);
      }
      apiUrl.searchParams.append("year", year);
      apiUrl.searchParams.append("month", month);
      apiUrl.searchParams.append("day", day);
      apiUrl.searchParams.append("hour", hour);
      apiUrl.searchParams.append("minute", minute);
      apiUrl.searchParams.append("second", second);
      apiUrl.searchParams.append("timezone", timezone);
      apiUrl.searchParams.append("latitude", latitude);
      apiUrl.searchParams.append("longitude", longitude);

      try {
        const response = await fetch(apiUrl.toString());

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        return await response.json();
      } catch (error) {
        console.error("Error:", error);
        return { error: error.message };
      }
    }

    function displayResults(jsonResult) {
      const resultsDiv = document.getElementById("results");
      const errorDiv = document.getElementById("error");

      if (jsonResult.error) {
        errorDiv.innerHTML = `<p>Error: ${jsonResult.error}</p>`;
        resultsDiv.innerHTML = "";
      } else {
        errorDiv.innerHTML = "";
        const jsonString = JSON.stringify(jsonResult, null, 2);
        resultsDiv.innerHTML = `<pre>${jsonString}</pre>`;
        // The API returns a JSON object with:
        // - planets: Ecliptic longitude (0-360) and Zodiac Sign.
        // - houses: Where the Zodiac signs fall relative to the Earth's horizon.
        // - aspects: Geometric relationships between planets (e.g., Square, Trine).
      }
    }
  </script>
</body>

</html>
